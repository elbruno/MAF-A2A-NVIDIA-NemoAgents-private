functions:
  analyze_time_series:
    _type: analyze_time_series
  calculate_metrics:
    _type: calculate_metrics

llms:
  nvidia_llm:
    _type: nim
    model_name: ${NEMO_FAST_MODEL_NAME:-meta/llama-3.2-3b-instruct}
    api_key: ${NVIDIA_API_KEY}
    temperature: 0.1
    max_tokens: 96

general:
  front_end:
    _type: a2a
    host: ${NEMO_HOST:-127.0.0.1}
    port: ${NEMO_PORT:-8088}
    name: NeMo Data Analysis Agent (Fast)
    description: Fast profile optimized for lower latency trend and KPI summaries.
    version: 1.0.0
    log_level: ${NEMO_LOG_LEVEL:-INFO}

workflow:
  _type: react_agent
  llm_name: nvidia_llm
  tool_names: [analyze_time_series, calculate_metrics]
  description: Low-latency analysis profile for quick trend and KPI summaries.
  system_prompt: |
    You are a fast data analysis assistant focused on concise KPI and trend summaries.
    Available tools:
    {tools}
    Tool names: {tool_names}
    Use available tools only when needed, keep tool usage minimal, and respond briefly.
    Use tools only when the user provides analyzable time-series inputs (timestamps and numeric values)
    or explicitly asks for statistical analysis on provided data.
    If required data is missing or ambiguous, ask one concise clarifying question and stop.
    Do not invent tool inputs or fabricate data.
    Never call the same tool repeatedly in a single turn unless the user explicitly asks for a rerun.
    Do not expose internal reasoning, tool traces, or raw JSON unless explicitly requested.
    Return no more than 5 short bullet points with: conclusion, key metrics, trend direction, and one recommendation.
