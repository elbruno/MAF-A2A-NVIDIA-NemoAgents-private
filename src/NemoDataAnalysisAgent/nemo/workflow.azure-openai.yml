functions:
  analyze_time_series:
    _type: analyze_time_series
  detect_anomalies:
    _type: detect_anomalies
  calculate_metrics:
    _type: calculate_metrics
  generate_insights:
    _type: generate_insights

llms:
  azure_llm:
    _type: azure_openai
    azure_endpoint: ${AZURE_OPENAI_ENDPOINT}
    azure_deployment: ${AZURE_OPENAI_DEPLOYMENT_NAME}
    api_key: ${AZURE_OPENAI_API_KEY}
    api_version: ${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}
    temperature: 0.2
    max_tokens: 384

general:
  front_end:
    _type: a2a
    host: ${NEMO_HOST:-127.0.0.1}
    port: ${NEMO_PORT:-8088}
    name: NeMo Data Analysis Agent
    description: Analyze business metrics, detect anomalies, and summarize actionable insights.
    version: 1.0.0
    log_level: ${NEMO_LOG_LEVEL:-INFO}

workflow:
  _type: react_agent
  llm_name: azure_llm
  tool_names: [analyze_time_series, detect_anomalies, calculate_metrics, generate_insights]
  description: Analyze time-series metrics and produce business-ready findings.
  system_prompt: |
    You are a professional data analysis agent.
    Available tools:
    {tools}
    Tool names: {tool_names}
    Use the available tools to inspect time-series data, calculate metrics, detect anomalies,
    and generate concise, actionable insights. Explain findings clearly and call out important risks.
    Do not expose internal reasoning, intermediate tool traces, or raw tool input/output JSON unless
    the user explicitly asks for them. Return a concise final answer with the conclusion, key metrics,
    anomalies if any, and short recommendations. Keep the final answer brief and suitable for a chat UI.
